<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Flappy - God Mode</title>
    <style>
        body { margin: 0; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Arial', sans-serif; overflow: hidden; touch-action: none; color: white; }
        canvas { background: linear-gradient(#4ec0ca 0%, #a4e4e9 100%); border: 3px solid #fff; border-radius: 12px; box-shadow: 0 0 40px rgba(0,0,0,0.7); max-width: 95vw; max-height: 75vh; }
        .ui { margin-bottom: 10px; display: flex; gap: 15px; align-items: center; }
        .btn-god { padding: 12px 20px; border: none; background: #34495e; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-god.active { background: #f1c40f; color: #000; box-shadow: 0 0 20px #f1c40f; }
        .score { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

<div class="ui">
    <div class="score">🏆 En İyi: <span id="best">0</span></div>
    <button id="godModeBtn" class="btn-god">GOD MODE: KAPALI</button>
</div>

<canvas id="game" width="360" height="580"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const bestEl = document.getElementById('best');
const godBtn = document.getElementById('godModeBtn');

// Fizik ve Ayarlar
const config = { gravity: 0.25, jump: -4.8, pipeSpeed: 3, gap: 150, pipeWidth: 52 };
let state = { bird: { x: 60, y: 290, v: 0, r: 14 }, pipes: [], score: 0, frame: 0, status: 'START', isGod: false };

let highscore = localStorage.getItem('flappy_god_score') || 0;
bestEl.innerText = highscore;

// Kontroller
const input = () => {
    if (state.status === 'START') state.status = 'PLAY';
    else if (state.status === 'OVER') reset();
    else if (!state.isGod) state.bird.v = config.jump;
};

window.onkeydown = e => { if(e.code === 'Space' || e.code === 'ArrowUp') input(); };
canvas.ontouchstart = e => { e.preventDefault(); input(); };
godBtn.onclick = (e) => {
    e.stopPropagation();
    state.isGod = !state.isGod;
    godBtn.innerText = state.isGod ? "GOD MODE: AKTİF" : "GOD MODE: KAPALI";
    godBtn.classList.toggle('active');
};

function reset() {
    state.bird = { x: 60, y: 290, v: 0, r: 14 };
    state.pipes = []; state.score = 0; state.frame = 0; state.status = 'PLAY';
}

function update() {
    if (state.status !== 'PLAY') return;

    state.bird.v += config.gravity;
    state.bird.y += state.bird.v;

    // --- KUSURSUZ OTOMATİK PİLOT (GOD MODE) ---
    if (state.isGod) {
        let targetY = canvas.height / 2; // Varsayılan hedef ekranın ortası
        const nextPipe = state.pipes.find(p => p.x + config.pipeWidth > state.bird.x - state.bird.r);
        
        if (nextPipe) {
            // Borunun ortasını hedefle ama biraz pay bırak
            targetY = nextPipe.top + (config.gap / 2);
        }

        // Tahminleme: Eğer bir sonraki karede hedef seviyenin altına düşeceksek zıpla
        if (state.bird.y + state.bird.v > targetY) {
            state.bird.v = config.jump;
        }
    }

    if (state.frame % 90 === 0) {
        let h = Math.random() * (canvas.height - config.gap - 120) + 60;
        state.pipes.push({ x: canvas.width, top: h, scored: false });
    }

    state.pipes.forEach((p, i) => {
        p.x -= config.pipeSpeed;
        if (!p.scored && p.x < state.bird.x) { state.score++; p.scored = true; }
        if (p.x + config.pipeWidth < 0) state.pipes.splice(i, 1);

        // Çarpışma Testi
        if (state.bird.x + state.bird.r > p.x && state.bird.x - state.bird.r < p.x + config.pipeWidth) {
            if (state.bird.y - state.bird.r < p.top || state.bird.y + state.bird.r > p.top + config.gap) die();
        }
    });

    if (state.bird.y + state.bird.r > canvas.height || state.bird.y - state.bird.r < 0) die();
    state.frame++;
}

function die() {
    state.status = 'OVER';
    if (state.score > highscore) {
        highscore = state.score;
        localStorage.setItem('flappy_god_score', highscore);
        bestEl.innerText = highscore;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Borular
    state.pipes.forEach(p => {
        ctx.fillStyle = "#2ecc71";
        ctx.fillRect(p.x, 0, config.pipeWidth, p.top);
        ctx.fillRect(p.x, p.top + config.gap, config.pipeWidth, canvas.height);
        ctx.strokeStyle = "#27ae60"; ctx.lineWidth = 3;
        ctx.strokeRect(p.x, 0, config.pipeWidth, p.top);
        ctx.strokeRect(p.x, p.top + config.gap, config.pipeWidth, canvas.height);
    });

    // Kuş
    ctx.save();
    ctx.translate(state.bird.x, state.bird.y);
    ctx.rotate(Math.min(Math.PI / 4, Math.max(-Math.PI / 4, state.bird.v / 10)));
    ctx.fillStyle = "#f1c40f";
    ctx.beginPath(); ctx.arc(0, 0, state.bird.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(6, -4, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(8, -4, 2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#e67e22"; ctx.fillRect(8, 2, 10, 4); // Gaga
    ctx.restore();

    // Skor Tablosu
    ctx.fillStyle = "white"; ctx.font = "bold 50px Arial"; ctx.textAlign = "center";
    ctx.shadowColor = "black"; ctx.shadowBlur = 5;
    ctx.fillText(state.score, canvas.width/2, 100);
    ctx.shadowBlur = 0;

    if (state.status === 'START') {
        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "white"; ctx.font = "20px Arial";
        ctx.fillText("OYUNU BAŞLATMAK İÇİN DOKUN", canvas.width/2, canvas.height/2);
    }
    if (state.status === 'OVER') {
        ctx.fillStyle = "rgba(231,76,60,0.7)"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "white"; ctx.font = "bold 30px Arial";
        ctx.fillText("OYUN BİTTİ", canvas.width/2, canvas.height/2);
        ctx.font = "18px Arial"; ctx.fillText("Tekrar denemek için dokun", canvas.width/2, canvas.height/2 + 40);
    }
    requestAnimationFrame(draw);
}

setInterval(update, 1000/60);
draw();
</script>
</body>
</html>
