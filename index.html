<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Flappy - Ultra Edition</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Arial', sans-serif; overflow: hidden; touch-action: none; }
        canvas { background: linear-gradient(#4ec0ca, #a4e4e9); border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); max-width: 95vw; max-height: 75vh; cursor: pointer; }
        .ui-panel { margin-bottom: 15px; display: flex; gap: 20px; align-items: center; color: white; }
        .btn-auto { padding: 10px 20px; border: 2px solid #fff; background: transparent; color: white; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-auto.on { background: #2ecc71; border-color: #2ecc71; box-shadow: 0 0 15px #2ecc71; }
        .score-board { font-size: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="ui-panel">
    <div class="score-board">🏆 Rekor: <span id="best">0</span></div>
    <button id="autoBtn" class="btn-auto">OTOMATİK: KAPALI</button>
</div>

<canvas id="cvs" width="360" height="580"></canvas>

<script>
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const bestEl = document.getElementById('best');
const autoBtn = document.getElementById('autoBtn');

// Ayarlar & State
let gravity = 0.22, jump = -4.6, pipeSpeed = 2.8, gap = 155;
let bird = { x: 60, y: 290, v: 0, r: 14 };
let pipes = [], score = 0, frame = 0;
let isAuto = false, gameState = 'READY'; // READY, PLAYING, OVER

let best = localStorage.getItem('fb_best') || 0;
bestEl.innerText = best;

// Kontroller
const trigger = () => {
    if (gameState === 'READY') gameState = 'PLAYING';
    else if (gameState === 'OVER') reset();
    else if (!isAuto) bird.v = jump;
};

window.addEventListener('keydown', e => { if(e.code === 'Space' || e.code === 'ArrowUp') trigger(); });
cvs.addEventListener('touchstart', e => { e.preventDefault(); trigger(); });
autoBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    isAuto = !isAuto;
    autoBtn.innerText = isAuto ? "OTOMATİK: AÇIK" : "OTOMATİK: KAPALI";
    autoBtn.classList.toggle('on');
});

function reset() {
    bird.y = 290; bird.v = 0; pipes = []; score = 0; frame = 0;
    gameState = 'PLAYING';
}

function update() {
    if (gameState !== 'PLAYING') return;

    bird.v += gravity;
    bird.y += bird.v;

    // AI Mantığı (İyileştirilmiş)
    if (isAuto && pipes.length > 0) {
        let p = pipes.find(p => p.x + 50 > bird.x - bird.r);
        if (p) {
            let target = p.top + (gap / 2) + 10;
            if (bird.y > target && bird.v > 0.5) bird.v = jump;
        }
    }

    if (frame % 90 === 0) {
        let h = Math.random() * (cvs.height - gap - 120) + 60;
        pipes.push({ x: cvs.width, top: h, passed: false });
    }

    pipes.forEach((p, i) => {
        p.x -= pipeSpeed;
        if (!p.passed && p.x < bird.x) { score++; p.passed = true; }
        if (p.x + 50 < 0) pipes.splice(i, 1);

        // Çarpışma
        if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + 50) {
            if (bird.y - bird.r < p.top || bird.y + bird.r > p.top + gap) die();
        }
    });

    if (bird.y + bird.r > cvs.height || bird.y - bird.r < 0) die();
    frame++;
}

function die() {
    gameState = 'OVER';
    if (score > best) {
        best = score;
        localStorage.setItem('fb_best', best);
        bestEl.innerText = best;
    }
}

function draw() {
    ctx.clearRect(0, 0, cvs.width, cvs.height);

    // Borular
    pipes.forEach(p => {
        let g = ctx.createLinearGradient(p.x, 0, p.x + 50, 0);
        g.addColorStop(0, '#2ecc71'); g.addColorStop(1, '#27ae60');
        ctx.fillStyle = g;
        ctx.fillRect(p.x, 0, 50, p.top);
        ctx.fillRect(p.x, p.top + gap, 50, cvs.height);
    });

    // Kuş
    ctx.fillStyle = "#f1c40f";
    ctx.beginPath(); ctx.arc(bird.x, bird.y, bird.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "white"; // Göz
    ctx.beginPath(); ctx.arc(bird.x + 7, bird.y - 5, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "black"; // Göz bebeği
    ctx.beginPath(); ctx.arc(bird.x + 9, bird.y - 5, 2, 0, Math.PI*2); ctx.fill();

    // Skor
    ctx.fillStyle = "white";
    ctx.font = "bold 40px Arial";
    ctx.textAlign = "center";
    ctx.fillText(score, cvs.width/2, 100);

    if (gameState === 'READY') {
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.fillRect(0,0,cvs.width, cvs.height);
        ctx.fillStyle = "white"; ctx.font = "20px Arial";
        ctx.fillText("BAŞLAMAK İÇİN DOKUN", cvs.width/2, cvs.height/2);
    }
    
    if (gameState === 'OVER') {
        ctx.fillStyle = "rgba(231, 76, 60, 0.6)";
        ctx.fillRect(0,0,cvs.width, cvs.height);
        ctx.fillStyle = "white"; ctx.fillText("EYVAH! PATLADIK", cvs.width/2, cvs.height/2);
        ctx.font = "16px Arial"; ctx.fillText("Tekrar denemek için dokun", cvs.width/2, cvs.height/2 + 40);
    }

    requestAnimationFrame(draw);
}

setInterval(update, 1000/60);
draw();
</script>
</body>
</html>
