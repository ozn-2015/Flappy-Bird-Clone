<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gemini Flappy Bird</title>
    <style>
        body { margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; font-family: sans-serif; }
        canvas { border: 4px solid #fff; background: #70c5ce; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Oyun Değişkenleri
let bird = { x: 50, y: 300, w: 30, h: 30, gravity: 0.6, lift: -10, velocity: 0 };
let pipes = [];
let frame = 0;
let score = 0;
let gameActive = true;

// Kontroller
window.addEventListener('keydown', () => { if(gameActive) bird.velocity += bird.lift; else resetGame(); });
window.addEventListener('touchstart', () => { if(gameActive) bird.velocity += bird.lift; else resetGame(); });

function createPipe() {
    let gap = 150;
    let minHeight = 50;
    let height = Math.floor(Math.random() * (canvas.height - gap - (2 * minHeight))) + minHeight;
    pipes.push({ x: canvas.width, top: height, bottom: canvas.height - height - gap });
}

function resetGame() {
    bird.y = 300; bird.velocity = 0; pipes = []; score = 0; frame = 0; gameActive = true; loop();
}

function loop() {
    if (!gameActive) return;

    // Temizlik
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Arka Plan (Basit Gökyüzü)
    ctx.fillStyle = "#70c5ce";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Kuş Hareket
    bird.velocity += bird.gravity;
    bird.y += bird.velocity;

    // Kuş Çizimi
    ctx.fillStyle = "#f4d03f";
    ctx.fillRect(bird.x, bird.y, bird.w, bird.h);

    // Boru Üretimi
    if (frame % 90 === 0) createPipe();

    // Boru Hareket ve Çizim
    for (let i = pipes.length - 1; i >= 0; i--) {
        pipes[i].x -= 3;

        ctx.fillStyle = "#2ecc71";
        // Üst Boru
        ctx.fillRect(pipes[i].x, 0, 50, pipes[i].top);
        // Alt Boru
        ctx.fillRect(pipes[i].x, canvas.height - pipes[i].bottom, 50, pipes[i].bottom);

        // Çarpışma Kontrolü
        if (bird.x < pipes[i].x + 50 && bird.x + bird.w > pipes[i].x &&
            (bird.y < pipes[i].top || bird.y + bird.h > canvas.height - pipes[i].bottom)) {
            gameActive = false;
        }

        // Skor
        if (pipes[i].x === 50) score++;

        // Boru Silme
        if (pipes[i].x + 50 < 0) pipes.splice(i, 1);
    }

    // Yer ve Tavan Kontrolü
    if (bird.y + bird.h > canvas.height || bird.y < 0) gameActive = false;

    // Skor Çizimi
    ctx.fillStyle = "white";
    ctx.font = "30px Arial";
    ctx.fillText(`Skor: ${score}`, 20, 50);

    if (!gameActive) {
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.fillText("OYUN BİTTİ", canvas.width/2, canvas.height/2);
        ctx.font = "20px Arial";
        ctx.fillText("Tekrar için bir tuşa bas", canvas.width/2, canvas.height/2 + 40);
    }

    frame++;
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
