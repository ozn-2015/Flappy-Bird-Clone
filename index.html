<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro-Flappy Realism (God Mode Ultra)</title>
    <style>
        body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Open Sans', sans-serif; overflow: hidden; touch-action: none; color: white; }
        #wrapper { position: relative; }
        canvas { background: #111; border: 4px solid #fff; border-radius: 12px; box-shadow: 0 0 50px rgba(0,0,0,0.8); max-width: 95vw; max-height: 75vh; }
        .ui { position: absolute; top: 15px; left: 15px; display: flex; gap: 15px; align-items: center; pointer-events: none; z-index: 10; }
        .score-box { background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 8px; font-weight: bold; font-size: 20px; }
        .controls { position: absolute; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; pointer-events: none; }
        .btn-god { padding: 12px 24px; border: none; background: #444; color: white; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 16px; pointer-events: auto; transition: 0.3s; }
        .btn-god.active { background: #e74c3c; color: white; box-shadow: 0 0 25px #c0392b; }
    </style>
</head>
<body>

<div id="wrapper">
    <div class="ui">
        <div class="score-box">🏆 Rekor: <span id="best">0</span></div>
    </div>
    <div class="controls">
        <button id="godModeBtn" class="btn-god">GOD MODE: KAPALI</button>
    </div>
    <canvas id="game" width="360" height="580"></canvas>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const bestEl = document.getElementById('best');
const godBtn = document.getElementById('godModeBtn');

// --- Fizik ve Ayarlar ---
const config = { gravity: 0.28, jump: -5.2, pipeSpeed: 3.2, gap: 160, pipeWidth: 70 };
let state = { bird: { x: 70, y: 290, v: 0, r: 16 }, pipes: [], score: 0, frame: 0, status: 'START', isGod: false };

let highscore = localStorage.getItem('fb_real_god_score') || 0;
bestEl.innerText = highscore;

// --- Girdiler ---
const trigger = () => {
    if (state.status === 'START') state.status = 'PLAY';
    else if (state.status === 'OVER') reset();
    else if (!state.isGod) state.bird.v = config.jump;
};

window.onkeydown = e => { if(e.code === 'Space' || e.code === 'ArrowUp') trigger(); };
canvas.ontouchstart = e => { e.preventDefault(); trigger(); };
godBtn.onclick = (e) => {
    e.stopPropagation();
    state.isGod = !state.isGod;
    godBtn.innerText = state.isGod ? "GOD MODE: AKTİF" : "GOD MODE: KAPALI";
    godBtn.classList.toggle('active');
};

function reset() {
    state.bird = { x: 70, y: 290, v: 0, r: 16 };
    state.pipes = []; state.score = 0; state.frame = 0; state.status = 'PLAY';
}

function update() {
    if (state.status !== 'PLAY') return;

    state.bird.v += config.gravity;
    state.bird.y += state.bird.v;

    // --- KUSURSUZ OTOMATİK PİLOT (GOD MODE ULTRA) ---
    // Bu algoritma, yerçekimini ve zıplamayı hesaba katan kesin bir tahmindir.
    if (state.isGod) {
        let targetY = canvas.height / 2; // Varsayılan hedef
        let nextPipe = null;

        // Gelecekteki boruyu bul
        for (let i = 0; i < state.pipes.length; i++) {
            if (state.pipes[i].x + config.pipeWidth > state.bird.x - state.bird.r) {
                nextPipe = state.pipes[i];
                break;
            }
        }
        
        if (nextPipe) {
            // Borunun tam ortasını hedefle, hata payı bırakma
            targetY = nextPipe.top + (config.gap / 2);
        }

        // Tahminleme: Eğer bir sonraki karede zıplamazsak hedef seviyenin altına düşeceksek zıpla.
        // Bu, kuşun dikey hareketini boru gelmeden çok önce düzenlemesini sağlar.
        if (state.bird.y + state.bird.v > targetY) {
            state.bird.v = config.jump;
        }
    }

    if (state.frame % 85 === 0) {
        let h = Math.random() * (canvas.height - config.gap - 140) + 70;
        state.pipes.push({ x: canvas.width, top: h, scored: false });
    }

    state.pipes.forEach((p, i) => {
        p.x -= config.pipeSpeed;
        if (!p.scored && p.x < state.bird.x) { state.score++; p.scored = true; }
        if (p.x + config.pipeWidth < 0) state.pipes.splice(i, 1);

        // Çarpışma Testi (Matematiksel Daire-Dikdörtgen)
        let bx = state.bird.x, by = state.bird.y, br = state.bird.r;
        let c = {
            // Üst Boru
            up: { x: Math.max(p.x, Math.min(bx, p.x + config.pipeWidth)), y: Math.max(0, Math.min(by, p.top)) },
            // Alt Boru
            down: { x: Math.max(p.x, Math.min(bx, p.x + config.pipeWidth)), y: Math.max(p.top + config.gap, Math.min(by, canvas.height)) }
        };

        let dUp = Math.sqrt(Math.pow(bx - c.up.x, 2) + Math.pow(by - c.up.y, 2));
        let dDown = Math.sqrt(Math.pow(bx - c.down.x, 2) + Math.pow(by - c.down.y, 2));

        if (dUp < br || dDown < br) die();
    });

    if (state.bird.y + state.bird.r > canvas.height || state.bird.y - state.bird.r < 0) die();
    state.frame++;
}

function die() {
    state.status = 'OVER';
    if (state.score > highscore) {
        highscore = state.score;
        localStorage.setItem('fb_real_god_score', highscore);
        bestEl.innerText = highscore;
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // --- Arka Plan (Gerçekçi Paralaks) ---
    // Gökyüzü (Durağan)
    let gSky = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gSky.addColorStop(0, '#11121d'); gSky.addColorStop(1, '#2c3e50');
    ctx.fillStyle = gSky; ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Orman (Yavaş Paralaks)
    ctx.fillStyle = "rgba(10, 30, 10, 0.4)";
    let offset = (state.frame * 0.5) % 200;
    for (let i = -1; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(i * 200 - offset, 300);
        ctx.bezierCurveTo(i * 200 + 100 - offset, 280, i * 200 + 100 - offset, 320, i * 200 + 200 - offset, 300);
        ctx.lineTo(i * 200 + 200 - offset, canvas.height);
        ctx.lineTo(i * 200 - offset, canvas.height);
        ctx.fill();
    }

    // --- Borular (Gerçekçi Metalik Dokulu) ---
    state.pipes.forEach(p => {
        // Ana boru (Metal dokulu gradyan)
        let gPipe = ctx.createLinearGradient(p.x, 0, p.x + config.pipeWidth, 0);
        gPipe.addColorStop(0, '#1a1d20'); gPipe.addColorStop(0.3, '#3e4b5a');
        gPipe.addColorStop(0.7, '#1a1d20'); gPipe.addColorStop(1, '#0c0e10');
        ctx.fillStyle = gPipe;
        ctx.fillRect(p.x, 0, config.pipeWidth, p.top);
        ctx.fillRect(p.x, p.top + config.gap, config.pipeWidth, canvas.height);

        // Boru kapakları (Metalik çıkıntılar)
        ctx.fillStyle = "#111"; // Daha koyu gölge
        let capH = 15;
        // Üst boru kapağı
        ctx.fillRect(p.x - 5, p.top - capH, config.pipeWidth + 10, capH);
        // Alt boru kapağı
        ctx.fillRect(p.x - 5, p.top + config.gap, config.pipeWidth + 10, capH);
    });

    // --- Kuş (Gerçekçi 3D Efektli) ---
    ctx.save();
    ctx.translate(state.bird.x, state.bird.y);
    ctx.rotate(Math.min(Math.PI / 3, Math.max(-Math.PI / 4, state.bird.v / 9)));
    
    // Ana gövde (3D etkili gradyan)
    let gBird = ctx.createRadialGradient(-5, -5, 2, 0, 0, state.bird.r + 5);
    gBird.addColorStop(0, '#f9ca24'); gBird.addColorStop(1, '#e67e22');
    ctx.fillStyle = gBird;
    ctx.beginPath(); ctx.arc(0, 0, state.bird.r, 0, Math.PI*2); ctx.fill();

    // Göz (Detaylı)
    ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(6, -4, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(8, -4, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(9, -5, 1, 0, Math.PI*2); ctx.fill(); // Işık yansıması

    // Gaga (Metalik)
    ctx.fillStyle = "#f39c12"; ctx.fillRect(10, 2, 10, 5); 
    ctx.restore();

    // --- Skor Tablosu (Merkezi ve Şık) ---
    ctx.fillStyle = "white"; ctx.font = "bold 60px 'Open Sans', Arial"; ctx.textAlign = "center";
    ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 10;
    ctx.fillText(state.score, canvas.width/2, 120);
    ctx.shadowBlur = 0;

    // --- Durum Ekranları ---
    if (state.status === 'START') {
        ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "white"; ctx.font = "bold 24px Arial"; ctx.fillText("BAŞLAMAK İÇİN DOKUN", canvas.width/2, canvas.height/2);
    }
    if (state.status === 'OVER') {
        ctx.fillStyle = "rgba(231,76,60,0.8)"; ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = "white"; ctx.font = "bold 36px Arial"; ctx.fillText("OYUN BİTTİ", canvas.width/2, canvas.height/2);
        ctx.font = "18px Arial"; ctx.fillText("Tekrar denemek için dokun", canvas.width/2, canvas.height/2 + 45);
    }
    requestAnimationFrame(draw);
}

setInterval(update, 1000/60);
draw();
</script>
</body>
</html>
